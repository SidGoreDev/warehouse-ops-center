session: gpu-2
description: "Full per-stream pass: all 4 modes on the curated clip corpus + evaluation"

jobs:
  - type: per_stream
    mode: load
    clips:
      - { stream_id: cam_01, path: data/videos/clip01.mp4 }
      - { stream_id: cam_02, path: data/videos/clip02.mp4 }
      - { stream_id: cam_03, path: data/videos/clip03.mp4 }
      - { stream_id: cam_04, path: data/videos/clip04.mp4 }
    output_dir: outputs/gpu-2/per_stream/

  - type: per_stream
    mode: safety
    clips:
      - { stream_id: cam_01, path: data/videos/clip01.mp4 }
      - { stream_id: cam_02, path: data/videos/clip02.mp4 }
      - { stream_id: cam_03, path: data/videos/clip03.mp4 }
      - { stream_id: cam_04, path: data/videos/clip04.mp4 }
    output_dir: outputs/gpu-2/per_stream/

  - type: per_stream
    mode: security
    clips:
      - { stream_id: cam_01, path: data/videos/clip01.mp4 }
      - { stream_id: cam_02, path: data/videos/clip02.mp4 }
      - { stream_id: cam_03, path: data/videos/clip03.mp4 }
      - { stream_id: cam_04, path: data/videos/clip04.mp4 }
    output_dir: outputs/gpu-2/per_stream/

  - type: per_stream
    mode: timeline
    clips:
      - { stream_id: cam_01, path: data/videos/clip01.mp4 }
      - { stream_id: cam_02, path: data/videos/clip02.mp4 }
      - { stream_id: cam_03, path: data/videos/clip03.mp4 }
      - { stream_id: cam_04, path: data/videos/clip04.mp4 }
    output_dir: outputs/gpu-2/per_stream/

  - type: evaluation
    results_dir: outputs/gpu-2/per_stream/
    ground_truth_dir: data/ground_truth/
    output: outputs/gpu-2/eval_report.json
