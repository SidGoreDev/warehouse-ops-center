session: local-example
description: "Example manifest: run two modes on two clips"

jobs:
  - type: per_stream
    mode: timeline
    clips:
      - { stream_id: cam_01, path: data/videos/clip01.mp4 }
      - { stream_id: cam_02, path: data/videos/clip02.mp4 }
    output_dir: outputs/per_stream/

  - type: per_stream
    mode: safety
    clips:
      - { stream_id: cam_01, path: data/videos/clip01.mp4 }
    output_dir: outputs/per_stream/

  - type: evaluation
    results_dir: outputs/per_stream/
    ground_truth_dir: data/ground_truth/
    output: outputs/eval_report.json
